<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Login | TipsyTheoryy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold text-[#0D3B30]">TipsyTheoryy</h1>
            <p class="text-gray-500 mt-2">Merchant Dashboard Login</p>
        </div>

        <form id="loginForm" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-[#0D3B30] focus:border-transparent outline-none transition"
                    placeholder="name@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-[#0D3B30] focus:border-transparent outline-none transition"
                    placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="h-4 w-4 text-[#0D3B30] focus:ring-[#0D3B30] border-gray-300 rounded">
                    <label for="remember" class="ml-2 block text-sm text-gray-700">Remember Me</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-[#F97316] hover:text-[#EA580C]">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-[#0D3B30] text-white font-semibold py-3 rounded-lg hover:bg-[#0A2F26] transition shadow-lg shadow-[#0D3B30]/20 flex items-center justify-center">
                <span>Sign In</span>
                <div id="loader" class="hidden ml-3 w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </button>
        </form>

        <div class="text-center text-sm text-gray-500">
            Don't have a store yet?
            <a href="{% url 'merchant_signup' %}" class="font-semibold text-[#F97316] hover:text-[#EA580C]">Sign Up Now</a>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');

            submitBtn.disabled = true;
            loader.classList.remove('hidden');

            try {
                const response = await fetch('/api/v1/auth/partner/login/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': API.getCSRFToken()
                    },
                    body: JSON.stringify({ username: email, password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = '/merchant/dashboard/';
                } else {
                    alert(data.error || 'Login failed. Please check your credentials.');
                }
            } catch (err) {
                console.error(err);
                alert('Something went wrong. Please try again later.');
            } finally {
                submitBtn.disabled = false;
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
